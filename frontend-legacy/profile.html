<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Hey Roomie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Hey Roomie</h1>
            <p>Complete your profile to find matches</p>
        </header>

        <nav class="nav-bar">
            <a href="matches.html">Find Matches</a>
            <a href="profile.html" class="active">My Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>

        <div class="card">
            <h2>My Profile</h2>
            <div id="profile-message" class="message"></div>

            <form id="profile-form">
                <!-- Sleep Schedule -->
                <div class="form-group">
                    <label for="sleep-time">Sleep Schedule *</label>
                    <select id="sleep-time" required>
                        <option value="">Select your sleep schedule</option>
                        <option value="early">Early Bird (before 10 PM)</option>
                        <option value="late">Night Owl (after 11 PM)</option>
                        <option value="flexible">Flexible</option>
                    </select>
                </div>

                <div class="form-row">
                    <!-- Cleanliness -->
                    <div class="form-group">
                        <label for="cleanliness">Cleanliness Level * (1-5)</label>
                        <input type="range" id="cleanliness" min="1" max="5" value="3" required>
                        <div class="range-value" id="cleanliness-value">3</div>
                        <small style="color: #666;">1 = Very Messy, 5 = Very Clean</small>
                    </div>

                    <!-- Budget -->
                    <div class="form-group">
                        <label for="budget">Monthly Budget (₹) *</label>
                        <input type="number" id="budget" required placeholder="e.g., 15000" min="1000">
                    </div>
                </div>

                <div class="form-row">
                    <!-- Diet -->
                    <div class="form-group">
                        <label for="diet">Diet Preference *</label>
                        <select id="diet" required>
                            <option value="">Select diet type</option>
                            <option value="veg">Vegetarian</option>
                            <option value="eggetarian">Eggetarian</option>
                            <option value="nonveg">Non-Vegetarian</option>
                        </select>
                    </div>

                    <!-- Noise Tolerance -->
                    <div class="form-group">
                        <label for="noise-tolerance">Noise Tolerance *</label>
                        <select id="noise-tolerance" required>
                            <option value="">Select noise preference</option>
                            <option value="quiet">Prefer Quiet</option>
                            <option value="moderate">Moderate Noise OK</option>
                            <option value="loud">Loud Environment OK</option>
                        </select>
                    </div>
                </div>

                <!-- Tax Bracket -->
                <div class="form-group">
                    <label for="tax-bracket">Income/Tax Bracket *</label>
                    <select id="tax-bracket" required>
                        <option value="">Select your bracket</option>
                        <option value="low">Low (under ₹5 Lakhs)</option>
                        <option value="medium">Medium (₹5-15 Lakhs)</option>
                        <option value="high">High (above ₹15 Lakhs)</option>
                    </select>
                </div>

                <!-- Languages -->
                <div class="form-group">
                    <label>Languages You Speak *</label>
                    <div id="languages-container" class="language-select">
                        <!-- Languages will be loaded here -->
                        <div class="loading">Loading languages...</div>
                    </div>
                </div>

                <hr style="margin: 25px 0; border: none; border-top: 1px solid #e0e0e0;">

                <h3>Matching Preferences</h3>
                <p style="color: #666; margin-bottom: 15px;">These help us find better matches for you (optional)</p>

                <div class="form-row">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="prefers-same-diet">
                            Prefer same diet preference
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="prefers-same-sleep">
                            Prefer similar sleep schedule
                        </label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                    <a href="matches.html" class="btn btn-secondary">Skip to Matches</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Application JavaScript -->
    <script src="app.js"></script>
    <script>
        // Use userId from localStorage via shared function
        const userId = getCurrentUserId();

        // Check if logged in
        if (!userId) {
            window.location.href = 'login.html';
        }

        // Update cleanliness display
        document.getElementById('cleanliness').addEventListener('input', (e) => {
            document.getElementById('cleanliness-value').textContent = e.target.value;
        });

        // Load languages
        async function loadLanguages() {
            try {
                const response = await fetch(`${API_URL}/languages`);
                const languages = await response.json();

                const container = document.getElementById('languages-container');
                container.innerHTML = languages.map(lang => `
                    <div class="language-option">
                        <input type="checkbox" id="lang-${lang.id}" value="${lang.id}">
                        <label for="lang-${lang.id}" style="cursor: pointer; margin: 0;">${lang.name}</label>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading languages:', error);
                document.getElementById('languages-container').innerHTML = '<div class="error">Failed to load languages</div>';
            }
        }

        // Load existing profile
        async function loadProfile() {
            try {
                const response = await fetch(`${API_URL}/profile/${userId}`);

                if (response.ok) {
                    const profile = await response.json();

                    // Fill in the form
                    if (profile.sleep_time) {
                        document.getElementById('sleep-time').value = profile.sleep_time;
                        document.getElementById('cleanliness').value = profile.cleanliness;
                        document.getElementById('cleanliness-value').textContent = profile.cleanliness;
                        document.getElementById('diet').value = profile.diet;
                        document.getElementById('noise-tolerance').value = profile.noise_tolerance;
                        document.getElementById('budget').value = profile.budget;
                        document.getElementById('tax-bracket').value = profile.tax_bracket;
                        document.getElementById('prefers-same-diet').checked = profile.prefers_same_diet;
                        document.getElementById('prefers-same-sleep').checked = profile.prefers_same_sleep;

                        // Check languages
                        if (profile.languages) {
                            profile.languages.forEach(lang => {
                                const checkbox = document.getElementById(`lang-${lang.id}`);
                                if (checkbox) checkbox.checked = true;
                            });
                        }
                    }
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // Save profile
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const messageDiv = document.getElementById('profile-message');

            // Get selected languages
            const selectedLanguages = [];
            document.querySelectorAll('#languages-container input[type="checkbox"]:checked').forEach(cb => {
                selectedLanguages.push(parseInt(cb.value));
            });

            if (selectedLanguages.length === 0) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please select at least one language';
                return;
            }

            const profileData = {
                userId: parseInt(userId),
                sleepTime: document.getElementById('sleep-time').value,
                cleanliness: parseInt(document.getElementById('cleanliness').value),
                diet: document.getElementById('diet').value,
                noiseTolerance: document.getElementById('noise-tolerance').value,
                budget: parseInt(document.getElementById('budget').value),
                taxBracket: document.getElementById('tax-bracket').value,
                languages: selectedLanguages,
                prefersSameDiet: document.getElementById('prefers-same-diet').checked,
                prefersSameSleep: document.getElementById('prefers-same-sleep').checked
            };

            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profileData)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Profile saved successfully! Redirecting to matches...';

                    setTimeout(() => {
                        window.location.href = 'matches.html';
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Failed to save profile';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Server error. Please try again.';
            }
        });

        // Initialize
        loadLanguages();
        loadProfile();
    </script>
</body>
</html>
