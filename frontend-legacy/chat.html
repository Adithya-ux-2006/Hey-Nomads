<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Hey Roomie</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Chat-specific styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: var(--primary-gradient);
            color: white;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .chat-header-text h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .chat-header-text p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Messages area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .message {
            display: flex;
            max-width: 75%;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .message-sent .message-bubble {
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message-received .message-bubble {
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 6px;
        }

        .message-meta {
            font-size: 0.75rem;
            margin-top: 6px;
            opacity: 0.7;
        }

        .message-sent .message-meta {
            text-align: right;
            color: rgba(255, 255, 255, 0.8);
        }

        .message-received .message-meta {
            text-align: left;
            color: var(--text-muted);
        }

        /* Input area */
        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 20px 24px;
            background: white;
            border-top: 1px solid var(--border-color);
            align-items: center;
        }

        .chat-input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 1rem;
            font-family: inherit;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: var(--shadow-md);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Empty state */
        .chat-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .chat-empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .chat-empty-state h4 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* Loading */
        .chat-loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .chat-loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 12px;
        }

        /* Error state */
        .chat-error {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .chat-error h4 {
            color: var(--danger-color);
            margin-bottom: 16px;
        }

        /* Date separator */
        .date-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .date-separator::before,
        .date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
            margin: 0 16px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .chat-container {
                height: calc(100vh - 160px);
                min-height: 400px;
                border-radius: var(--radius-lg);
            }

            .chat-header {
                padding: 16px 20px;
            }

            .messages-container {
                padding: 16px;
            }

            .message {
                max-width: 85%;
            }

            .chat-input-area {
                padding: 16px 20px;
            }
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hey Roomie</h1>
            <p>Chat with your matches</p>
        </header>

        <div class="chat-container">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-avatar" id="receiver-avatar">👤</div>
                    <div class="chat-header-text">
                        <h3 id="receiver-name">Loading...</h3>
                        <p>Potential Roommate</p>
                    </div>
                </div>
                <a href="matches.html" class="back-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Matches
                </a>
            </div>

            <!-- Messages Area -->
            <div class="messages-container" id="messages-container">
                <div class="chat-loading">Loading messages...</div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input
                        type="text"
                        id="message-input"
                        class="chat-input"
                        placeholder="Type a message..."
                        autocomplete="off"
                    >
                </div>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Application JavaScript -->
    <script src="app.js"></script>
    <script>
        // Get current user and receiver from URL/localStorage
        const currentUserId = getCurrentUserId();
        const urlParams = new URLSearchParams(window.location.search);
        const receiverId = urlParams.get('user');

        // Check authentication
        if (!currentUserId) {
            window.location.href = 'login.html';
        }

        // Check if receiver is specified
        if (!receiverId) {
            alert('No user selected. Redirecting to matches...');
            window.location.href = 'matches.html';
        }

        let receiverName = '';
        let messages = [];
        let lastMessagesJson = ''; // Track state to prevent flickering

        // Load receiver info
        async function loadReceiverInfo() {
            try {
                const response = await fetch(`${API_URL}/profile/${receiverId}`);
                if (response.ok) {
                    const profile = await response.json();
                    receiverName = profile.name || 'User';
                    document.getElementById('receiver-name').textContent = receiverName;
                    document.getElementById('receiver-avatar').textContent = receiverName.charAt(0).toUpperCase();
                } else {
                    document.getElementById('receiver-name').textContent = 'User ' + receiverId;
                }
            } catch (error) {
                console.error('Error loading receiver:', error);
                document.getElementById('receiver-name').textContent = 'User ' + receiverId;
            }
        }

        // Load messages from the backend
        async function loadMessages() {
            const container = document.getElementById('messages-container');
            
            try {
                // Fetch messages for this specific conversation
                const response = await fetch(`${API_URL}/messages/${currentUserId}/${receiverId}`);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to load messages');
                }

                const fetchedMessages = await response.json();
                const newMessagesJson = JSON.stringify(fetchedMessages);

                // Only re-render if the messages have actually changed
                if (newMessagesJson !== lastMessagesJson) {
                    messages = fetchedMessages;
                    lastMessagesJson = newMessagesJson;
                    renderMessages();
                }

            } catch (error) {
                console.error('Error loading messages:', error);
                
                // Show error message to user with a retry button
                container.innerHTML = `
                    <div class="chat-error">
                        <div class="chat-empty-state-icon">❌</div>
                        <h4>Failed to load messages</h4>
                        <p>${error.message}</p>
                        <button onclick="loadMessages()" class="btn btn-primary" style="margin-top: 10px;">Retry</button>
                    </div>
                `;
            }
        }

        // Render messages
        function renderMessages() {
            const container = document.getElementById('messages-container');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="chat-empty-state">
                        <div class="chat-empty-state-icon">💬</div>
                        <h4>No messages yet</h4>
                        <p>Start the conversation with ${receiverName || 'your match'}!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            let lastDate = null;

            messages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toLocaleDateString();

                // Add date separator if different day
                if (msgDate !== lastDate) {
                    const separator = document.createElement('div');
                    separator.className = 'date-separator';
                    separator.textContent = msgDate === new Date().toLocaleDateString() ? 'Today' : msgDate;
                    container.appendChild(separator);
                    lastDate = msgDate;
                }

                const isSent = msg.sender_id == currentUserId;
                const messageEl = document.createElement('div');
                messageEl.className = `message ${isSent ? 'message-sent' : 'message-received'}`;

                const time = getRelativeTime(msg.created_at);

                messageEl.innerHTML = `
                    <div class="message-bubble">
                        ${escapeHtml(msg.message)}
                        <div class="message-meta">${time}</div>
                    </div>
                `;

                container.appendChild(messageEl);
            });

            // Scroll to bottom
            scrollToBottom();
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Scroll to bottom of messages with smooth animation
        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTo({
                top: container.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Send a new message
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const messageText = input.value.trim();

            // Don't send empty messages
            if (!messageText) return;

            // Disable input while sending to prevent double-clicks
            input.disabled = true;
            sendBtn.disabled = true;

            try {
                // Prepare the message data
                const messageData = {
                    sender_id: parseInt(currentUserId),
                    receiver_id: parseInt(receiverId),
                    message: messageText
                };

                // Send to backend
                const response = await fetch(`${API_URL}/send-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(messageData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to send message');
                }

                // Clear the input and focus back
                input.value = '';
                
                // Refresh the messages immediately
                await loadMessages();

            } catch (error) {
                console.error('Error sending message:', error);
                alert('Oops! ' + error.message);
            } finally {
                // Re-enable the input
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // Send on Enter key
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize
        loadReceiverInfo();
        loadMessages();

        // Refresh messages every 3 seconds (faster for a snapier feel)
        setInterval(loadMessages, 3000);
    </script>
</body>
</html>
