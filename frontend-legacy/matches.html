<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Matches - Hey Roomie</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Hey Roomie</h1>
            <p>Discover your perfect roommate matches</p>
        </header>

        <nav class="nav-bar">
            <a href="matches.html" class="active">Find Matches</a>
            <a href="profile.html">My Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>

        <div class="card">
            <h2>Your Matches</h2>

            <div id="matches-container">
                <div class="loading">Finding your best matches...</div>
            </div>

            <!-- Refresh Button -->
            <div class="refresh-section">
                <button onclick="loadMatches()" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; vertical-align: middle;">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Refresh Matches
                </button>
            </div>
        </div>
    </div>

    <!-- Main Application JavaScript -->
    <script src="app.js"></script>
    <script>
        // Check authentication and load matches on page load
        (function init() {
            const userId = requireAuth();
            if (userId) {
                loadMatchesModern();
            }
        })();

        /**
         * Get CSS class for tag based on value
         */
        function getTagClass(type, value) {
            if (type === 'sleep') {
                return 'tag tag-sleep';
            }
            if (type === 'diet') {
                if (value === 'veg') return 'tag tag-diet-veg';
                if (value === 'eggetarian') return 'tag tag-diet-eggetarian';
                if (value === 'nonveg') return 'tag tag-diet-nonveg';
            }
            if (type === 'noise') {
                if (value === 'quiet') return 'tag tag-noise-quiet';
                if (value === 'moderate') return 'tag tag-noise-moderate';
                if (value === 'loud') return 'tag tag-noise-loud';
            }
            return 'tag';
        }

        /**
         * Format tag display value
         */
        function formatTagValue(type, value) {
            const formatters = {
                sleep: {
                    'early': '🌅 Early Bird',
                    'late': '🌙 Night Owl',
                    'flexible': '⏰ Flexible'
                },
                diet: {
                    'veg': '🥗 Veg',
                    'eggetarian': '🥚 Egg',
                    'nonveg': '🍗 Non-Veg'
                },
                noise: {
                    'quiet': '🔇 Quiet',
                    'moderate': '🔉 Moderate',
                    'loud': '🔊 Loud OK'
                }
            };
            return formatters[type]?.[value] || value;
        }

        /**
         * Render a modern match card
         */
        function renderModernMatchCard(match) {
            const card = document.createElement('div');
            card.className = 'match-card';

            // Header with name and score
            const header = document.createElement('div');
            header.className = 'match-card-header';

            const nameEl = document.createElement('div');
            nameEl.className = 'match-name';
            nameEl.textContent = match.name || 'Unknown User';
            header.appendChild(nameEl);

            const scoreBadge = document.createElement('div');
            scoreBadge.className = `match-score ${getScoreClass(match.score)}`;
            scoreBadge.textContent = match.score + '%';
            header.appendChild(scoreBadge);

            card.appendChild(header);

            // Tags section (Sleep, Diet, Noise)
            const tagsSection = document.createElement('div');
            tagsSection.className = 'match-tags';

            // Sleep tag
            if (match.sleep_time) {
                const sleepTag = document.createElement('span');
                sleepTag.className = getTagClass('sleep', match.sleep_time);
                sleepTag.textContent = formatTagValue('sleep', match.sleep_time);
                tagsSection.appendChild(sleepTag);
            }

            // Diet tag
            if (match.diet) {
                const dietTag = document.createElement('span');
                dietTag.className = getTagClass('diet', match.diet);
                dietTag.textContent = formatTagValue('diet', match.diet);
                tagsSection.appendChild(dietTag);
            }

            // Noise tag
            if (match.noise_tolerance) {
                const noiseTag = document.createElement('span');
                noiseTag.className = getTagClass('noise', match.noise_tolerance);
                noiseTag.textContent = formatTagValue('noise', match.noise_tolerance);
                tagsSection.appendChild(noiseTag);
            }

            // Cleanliness tag
            if (match.cleanliness) {
                const cleanTag = document.createElement('span');
                cleanTag.className = 'tag';
                const stars = '⭐'.repeat(match.cleanliness);
                cleanTag.textContent = `Clean: ${stars}`;
                tagsSection.appendChild(cleanTag);
            }

            card.appendChild(tagsSection);

            // Details row (Budget + Income)
            const detailsRow = document.createElement('div');
            detailsRow.className = 'match-details-row';

            // Budget
            if (match.budget) {
                const budgetItem = document.createElement('div');
                budgetItem.className = 'detail-item detail-budget';

                const budgetLabel = document.createElement('label');
                budgetLabel.textContent = 'Monthly Budget';
                budgetItem.appendChild(budgetLabel);

                const budgetValue = document.createElement('span');
                budgetValue.textContent = '₹' + match.budget.toLocaleString();
                budgetItem.appendChild(budgetValue);

                detailsRow.appendChild(budgetItem);
            }

            // Tax bracket
            if (match.tax_bracket) {
                const incomeItem = document.createElement('div');
                incomeItem.className = 'detail-item';

                const incomeLabel = document.createElement('label');
                incomeLabel.textContent = 'Income Bracket';
                incomeItem.appendChild(incomeLabel);

                const incomeValue = document.createElement('span');
                const bracketMap = {
                    'low': '💰 Low Income',
                    'medium': '💰💰 Medium',
                    'high': '💰💰💰 High'
                };
                incomeValue.textContent = bracketMap[match.tax_bracket] || match.tax_bracket;
                incomeItem.appendChild(incomeValue);

                detailsRow.appendChild(incomeItem);
            }

            card.appendChild(detailsRow);

            // Languages section
            if (match.languages && match.languages.length > 0) {
                const langSection = document.createElement('div');
                langSection.className = 'languages-section';

                const langLabel = document.createElement('span');
                langLabel.className = 'languages-label';
                langLabel.textContent = 'Speaks:';
                langSection.appendChild(langLabel);

                const langList = document.createElement('div');
                langList.className = 'languages-list';

                match.languages.forEach(lang => {
                    const langTag = document.createElement('span');
                    langTag.className = 'language-tag';
                    langTag.textContent = lang;
                    langList.appendChild(langTag);
                });

                langSection.appendChild(langList);
                langSection.appendChild(langList);
                card.appendChild(langSection);
            }

            // Chat Preview Section
            if (match.last_message) {
                const previewSection = document.createElement('div');
                previewSection.className = 'match-preview-section';
                previewSection.style.cssText = 'margin-top: 12px; padding: 10px; background: #f8fafc; border-radius: 8px; font-size: 0.85rem; border-left: 3px solid var(--primary-color);';

                const previewHeader = document.createElement('div');
                previewHeader.style.cssText = 'display: flex; justify-content: space-between; margin-bottom: 4px; color: var(--text-muted); font-weight: 500; font-size: 0.75rem;';
                previewHeader.innerHTML = `
                    <span>${match.last_message_from_me ? 'You' : 'Latest'}:</span>
                    <span>${getRelativeTime(match.last_message_time)}</span>
                `;
                previewSection.appendChild(previewHeader);

                const previewText = document.createElement('div');
                previewText.style.cssText = 'color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;';
                previewText.textContent = match.last_message;
                previewSection.appendChild(previewText);

                card.appendChild(previewSection);
            }

            // Chat button
            const chatBtnSection = document.createElement('div');
            chatBtnSection.style.cssText = 'margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);';

            const chatBtn = document.createElement('a');
            chatBtn.href = `chat.html?user=${match.id}`;
            chatBtn.className = 'btn btn-primary';
            chatBtn.style.cssText = 'width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;';
            chatBtn.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Start Chat
            `;
            chatBtnSection.appendChild(chatBtn);
            card.appendChild(chatBtnSection);

            return card;
        }

        /**
         * Load matches with modern UI
         */
        async function loadMatchesModern() {
            const userId = getCurrentUserId();
            const container = document.getElementById('matches-container');

            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            // Show loading
            container.innerHTML = '<div class="loading">Finding your best matches...</div>';

            try {
                const response = await fetch(`${API_URL}/matches/${userId}`);

                // Handle 404 - User hasn't created a profile yet
                if (response.status === 404) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>Complete Your Profile First!</h3>
                            <p>You need to set up your profile before we can find matches for you.</p>
                            <a href="profile.html" class="btn btn-primary">Set Up Profile</a>
                        </div>
                    `;
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to load matches');
                }

                const matches = await response.json();

                if (!matches || matches.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No Matches Yet</h3>
                            <p>Be the first to join! Share with friends to find roommates.</p>
                        </div>
                    `;
                    return;
                }

                // Clear container
                container.innerHTML = '';

                // Add summary
                const userName = getCurrentUserName();
                const summary = document.createElement('p');
                summary.className = 'matches-summary';
                summary.innerHTML = `Found <strong>${matches.length}</strong> potential roommates for you${userName ? ', ' + userName : ''}!`;
                container.appendChild(summary);

                // Create matches container
                const matchesList = document.createElement('div');
                matchesList.className = 'matches-container';

                // Render each match
                matches.forEach(match => {
                    const card = renderModernMatchCard(match);
                    matchesList.appendChild(card);
                });

                container.appendChild(matchesList);

            } catch (error) {
                console.error('Error loading matches:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Error Loading Matches</h3>
                        <p>${error.message || 'Something went wrong. Please try again later.'}</p>
                        <button onclick="loadMatchesModern()" class="btn btn-primary">Retry</button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
